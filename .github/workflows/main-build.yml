name: Main Build

# main 构建流水线（实现方案 §10）：合并到 main 后自动产出可下载的 debug APK。
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Unit test, lint and assemble debug
        run: ./gradlew testDebugUnitTest lint assembleDebug --stacktrace

      - name: Resolve build metadata
        id: meta
        run: |
          VERSION_NAME=$(grep -E "^\s*versionName\s*=" app/build.gradle.kts | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "version=${VERSION_NAME}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "build_time=$(date -u +%Y%m%dT%H%M%SZ)" >> "$GITHUB_OUTPUT"

      - name: Rename APK with traceable name
        run: |
          SRC=app/build/outputs/apk/debug/app-debug.apk
          DEST="PunchReminder-debug-${{ steps.meta.outputs.version }}-main-${{ steps.meta.outputs.short_sha }}.apk"
          cp "$SRC" "$DEST"
          echo "Produced $DEST"

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: PunchReminder-debug-${{ steps.meta.outputs.version }}-${{ steps.meta.outputs.short_sha }}
          path: PunchReminder-debug-*.apk
          retention-days: 30

      - name: Upload unit test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: main-unit-test-report
          path: app/build/reports/tests/
          retention-days: 30

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: main-lint-report
          path: app/build/reports/lint-results-*.html
          retention-days: 30

      - name: Build summary
        if: always()
        run: |
          {
            echo "### Main Build"
            echo ""
            echo "- Version: ${{ steps.meta.outputs.version }}"
            echo "- Commit: ${{ steps.meta.outputs.short_sha }}"
            echo "- Build time (UTC): ${{ steps.meta.outputs.build_time }}"
          } >> "$GITHUB_STEP_SUMMARY"
